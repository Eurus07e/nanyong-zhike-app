<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="南雍知课界面预览：学业概览、培养方案、课表、红黑榜、校园服务与备忘录。">
  <meta name="theme-color" content="#f5f5f7">
  <title>南雍知课 · 界面预览</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color: #1d1d1f;
      background: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: #d2d2d7;
      --surface: #fff;
      --soft: #f5f5f7;
      --purple: #5a2d82;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--soft); }
    body { margin: 0; min-width: 320px; overflow: hidden; background: var(--soft); color: var(--ink); -webkit-font-smoothing: antialiased; }
    button, a { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }
    :focus-visible { outline: 2px solid var(--purple); outline-offset: 3px; }

    .page {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 60px minmax(0, 1fr) 64px;
      overflow: hidden;
    }

    .site-header {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
      padding: 0 clamp(20px, 4vw, 64px);
      border-bottom: 1px solid rgba(210, 210, 215, .78);
      background: rgba(250, 250, 252, .88);
      backdrop-filter: saturate(155%) blur(22px);
    }

    .page-title { position: absolute; left: 50%; transform: translateX(-50%); margin: 0; font-size: 14px; font-weight: 650; }
    .repo-link {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .76);
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: border-color .18s ease, background-color .18s ease;
    }
    .repo-link:hover { border-color: #b8b8bd; background: #fff; }
    .repo-link svg { width: 15px; height: 15px; }

    .gallery {
      min-width: 0;
      min-height: 0;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      touch-action: pan-x;
      -webkit-overflow-scrolling: touch;
    }
    .gallery::-webkit-scrollbar { display: none; }

    .gallery-slide {
      width: 100%;
      min-width: 100%;
      flex: 0 0 100%;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      display: grid;
      place-items: center;
      padding: 14px clamp(16px, 3vw, 48px);
    }

    .shot-frame {
      width: min(1680px, 100%);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .shot-frame img {
      display: block;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(210, 210, 215, .92);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 18px 54px rgba(0, 0, 0, .10);
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .gallery-controls {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 18px;
      padding: 0 clamp(20px, 4vw, 64px);
      border-top: 1px solid rgba(210, 210, 215, .78);
      background: rgba(250, 250, 252, .92);
      backdrop-filter: saturate(155%) blur(22px);
    }
    .current-label { min-width: 0; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }

    .dots { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .dot {
      width: 7px;
      height: 7px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: #c7c7cc;
      cursor: pointer;
      transition: width .18s ease, border-radius .18s ease, background-color .18s ease;
    }
    .dot[aria-current="true"] { width: 24px; border-radius: 999px; background: var(--purple); }

    .arrow-controls { display: flex; justify-content: flex-end; gap: 8px; }
    .arrow-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      transition: border-color .18s ease, background-color .18s ease, opacity .18s ease;
    }
    .arrow-button:hover:not(:disabled) { border-color: #b8b8bd; background: #f8f8fa; }
    .arrow-button:disabled { cursor: default; opacity: .32; }
    .arrow-button svg { width: 18px; height: 18px; }

    .lightbox {
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
      margin: 0;
      padding: 24px;
      border: 0;
      background: rgba(245, 245, 247, .96);
      backdrop-filter: blur(22px);
    }
    .lightbox[open] { display: grid; place-items: center; }
    .lightbox::backdrop { background: rgba(0, 0, 0, .24); }
    .lightbox img { width: 100%; height: 100%; object-fit: contain; user-select: none; -webkit-user-drag: none; }
    .lightbox-close {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .9);
      cursor: pointer;
      z-index: 1;
    }
    .lightbox-close svg { width: 18px; height: 18px; }

    @media (max-width: 720px) {
      .page { grid-template-rows: 54px minmax(0, 1fr) 60px; }
      .site-header { gap: 12px; padding-inline: 14px; }
      .repo-link { min-height: 34px; padding-inline: 10px; }
      .gallery-slide { padding: 8px; }
      .shot-frame { align-items: start; }
      .shot-frame img { height: auto; max-height: 100%; box-shadow: 0 12px 34px rgba(0, 0, 0, .10); }
      .gallery-controls { grid-template-columns: minmax(0, 1fr) auto; gap: 10px; padding-inline: 14px; }
      .dots { display: none; }
      .arrow-button { width: 40px; height: 40px; }
      .lightbox { padding: 12px; }
      .lightbox-close { top: 12px; right: 12px; width: 40px; height: 40px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .gallery { scroll-behavior: auto; }
      .dot, .repo-link, .arrow-button { transition: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="page-title">界面预览</h1>
      <a class="repo-link" href="https://github.com/Eurus07e/nanyong-zhike-app">
        返回仓库
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7M7 7h10v10"/></svg>
      </a>
    </header>

    <main class="gallery" aria-label="南雍知课界面画廊" tabindex="0">
      <article class="gallery-slide" data-title="学业概览" aria-label="学业概览">
        <figure class="shot-frame"><img src="screenshots/academic-overview.jpeg" alt="南雍知课学业概览" draggable="false"></figure>
      </article>
      <article class="gallery-slide" data-title="培养方案" aria-label="培养方案">
        <figure class="shot-frame"><img src="screenshots/program.jpeg" alt="南雍知课培养方案" loading="lazy" draggable="false"></figure>
      </article>
      <article class="gallery-slide" data-title="我的课表" aria-label="我的课表">
        <figure class="shot-frame"><img src="screenshots/schedule.jpeg" alt="南雍知课我的课表" loading="lazy" draggable="false"></figure>
      </article>
      <article class="gallery-slide" data-title="红黑榜" aria-label="红黑榜">
        <figure class="shot-frame"><img src="screenshots/reviews.jpeg" alt="南雍知课红黑榜" loading="lazy" draggable="false"></figure>
      </article>
      <article class="gallery-slide" data-title="重要通知" aria-label="重要通知">
        <figure class="shot-frame"><img src="screenshots/notices.jpeg" alt="南雍知课重要通知" loading="lazy" draggable="false"></figure>
      </article>
      <article class="gallery-slide" data-title="NJU Tabs" aria-label="NJU Tabs">
        <figure class="shot-frame"><img src="screenshots/nju-tabs.jpeg" alt="南雍知课NJU Tabs" loading="lazy" draggable="false"></figure>
      </article>
      <article class="gallery-slide" data-title="备忘录" aria-label="备忘录">
        <figure class="shot-frame"><img src="screenshots/memos.jpeg" alt="南雍知课备忘录" loading="lazy" draggable="false"></figure>
      </article>
    </main>

    <footer class="gallery-controls">
      <div class="current-label" aria-live="polite">1 / 7</div>
      <div class="dots" aria-label="选择预览页面">
        <button class="dot" type="button" data-index="0" aria-label="查看学业概览" aria-current="true"></button>
        <button class="dot" type="button" data-index="1" aria-label="查看培养方案" aria-current="false"></button>
        <button class="dot" type="button" data-index="2" aria-label="查看我的课表" aria-current="false"></button>
        <button class="dot" type="button" data-index="3" aria-label="查看红黑榜" aria-current="false"></button>
        <button class="dot" type="button" data-index="4" aria-label="查看重要通知" aria-current="false"></button>
        <button class="dot" type="button" data-index="5" aria-label="查看 NJU Tabs" aria-current="false"></button>
        <button class="dot" type="button" data-index="6" aria-label="查看备忘录" aria-current="false"></button>
      </div>
      <div class="arrow-controls">
        <button class="arrow-button" type="button" data-action="view-original" aria-label="查看原图" title="查看原图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5"/></svg>
        </button>
        <button class="arrow-button" type="button" data-action="previous" aria-label="上一张" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="arrow-button" type="button" data-action="next" aria-label="下一张">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
    </footer>
  </div>

  <dialog class="lightbox" aria-label="原图预览">
    <button class="lightbox-close" type="button" aria-label="关闭原图预览">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
    </button>
    <img alt="" draggable="false">
  </dialog>

  <script>
    const gallery = document.querySelector(".gallery")
    const slides = Array.from(document.querySelectorAll(".gallery-slide"))
    const dots = Array.from(document.querySelectorAll(".dot"))
    const previousButton = document.querySelector('[data-action="previous"]')
    const nextButton = document.querySelector('[data-action="next"]')
    const viewOriginalButton = document.querySelector('[data-action="view-original"]')
    const currentLabel = document.querySelector(".current-label")
    const lightbox = document.querySelector(".lightbox")
    const lightboxImage = lightbox.querySelector("img")
    const lightboxClose = lightbox.querySelector(".lightbox-close")
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)")
    const SWIPE_THRESHOLD = 32
    let activeIndex = 0
    let frameRequest = 0
    let touchStartX = 0
    let touchStartY = 0
    let touchStartIndex = 0

    function updateControls(index) {
      activeIndex = Math.max(0, Math.min(index, slides.length - 1))
      currentLabel.textContent = `${activeIndex + 1} / ${slides.length}`
      currentLabel.setAttribute("aria-label", `${slides[activeIndex].dataset.title}，第 ${activeIndex + 1} 张，共 ${slides.length} 张`)
      previousButton.disabled = activeIndex === 0
      nextButton.disabled = activeIndex === slides.length - 1
      dots.forEach((dot, dotIndex) => dot.setAttribute("aria-current", String(dotIndex === activeIndex)))
    }

    function goToSlide(index) {
      const targetIndex = Math.max(0, Math.min(index, slides.length - 1))
      slides[targetIndex].scrollIntoView({
        behavior: reducedMotion.matches ? "auto" : "smooth",
        block: "nearest",
        inline: "center",
      })
      updateControls(targetIndex)
    }

    function syncToScroll() {
      cancelAnimationFrame(frameRequest)
      frameRequest = requestAnimationFrame(() => {
        const nextIndex = Math.round(gallery.scrollLeft / Math.max(gallery.clientWidth, 1))
        if (nextIndex !== activeIndex) updateControls(nextIndex)
      })
    }

    previousButton.addEventListener("click", () => goToSlide(activeIndex - 1))
    nextButton.addEventListener("click", () => goToSlide(activeIndex + 1))
    viewOriginalButton.addEventListener("click", () => {
      const image = slides[activeIndex].querySelector("img")
      lightboxImage.src = image.currentSrc || image.src
      lightboxImage.alt = image.alt
      lightbox.showModal()
    })
    lightboxClose.addEventListener("click", () => lightbox.close())
    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) lightbox.close()
    })
    dots.forEach((dot) => dot.addEventListener("click", () => goToSlide(Number(dot.dataset.index))))
    gallery.addEventListener("scroll", syncToScroll, { passive: true })
    gallery.addEventListener("dragstart", (event) => event.preventDefault())
    gallery.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0]
      touchStartX = touch.clientX
      touchStartY = touch.clientY
      touchStartIndex = activeIndex
    }, { passive: true })
    gallery.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0]
      const deltaX = touch.clientX - touchStartX
      const deltaY = touch.clientY - touchStartY
      if (Math.abs(deltaX) >= SWIPE_THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY)) {
        goToSlide(touchStartIndex + (deltaX < 0 ? 1 : -1))
        return
      }
      goToSlide(Math.round(gallery.scrollLeft / Math.max(gallery.clientWidth, 1)))
    }, { passive: true })
    gallery.addEventListener("wheel", (event) => {
      if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return
      event.preventDefault()
      gallery.scrollBy({ left: event.deltaY, behavior: "auto" })
    }, { passive: false })
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") goToSlide(activeIndex - 1)
      if (event.key === "ArrowRight") goToSlide(activeIndex + 1)
    })
    window.addEventListener("resize", () => goToSlide(activeIndex), { passive: true })
    updateControls(0)
  </script>
</body>
</html>
