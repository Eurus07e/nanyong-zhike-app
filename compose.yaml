name: nanyong-zhike

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  app:
    build:
      context: .
    image: nanyong-zhike-app:1.0
    restart: unless-stopped
    init: true
    environment:
      APP_ENV: production
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET to a random value of at least 32 characters}
      COOKIE_SECURE: "true"
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      DATABASE_PATH: /app/state/nanyong.db
      REVIEW_DATA_PATH: /app/reviews/merged_data.json
      NJU_CLI_BIN: /usr/local/bin/nju-cli
    volumes:
      - nanyong-state:/app/state
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: 30s
    logging: *default-logging

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      CADDY_ADDRESS: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    pids_limit: 128
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging: *default-logging

volumes:
  nanyong-state:
  caddy-data:
  caddy-config:
