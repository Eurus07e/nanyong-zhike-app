name: Release desktop packages

on:
  push:
    tags:
      - "v1.1.6"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NJU_CLI_BIN: /bin/true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install -e '.[dev]'
      - run: npm ci --prefix frontend
      - run: npm run lint --prefix frontend
      - run: npm run test:unit --prefix frontend
      - run: npm run build --prefix frontend
      - run: npm audit --prefix frontend --registry=https://registry.npmjs.org
      - run: pytest -q

  package:
    name: ${{ matrix.label }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-15
            platform: macos
            arch: arm64
            nju_binary: nju-cli
          - label: Windows x86_64
            os: windows-latest
            platform: windows
            arch: x86_64
            nju_binary: nju-cli.exe
          - label: Linux x86_64
            os: ubuntu-22.04
            platform: linux
            arch: x86_64
            nju_binary: nju-cli
          - label: Linux arm64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            nju_binary: nju-cli
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - run: python -m pip install . pyinstaller==6.21.0 pillow==11.3.0
      - name: Download and patch pinned nju-cli source
        shell: bash
        env:
          NJU_SOURCE_SHA256: 6d7f794e87b8c22a1f6b700899f0c03c08f37a57499cc5e7014f0a80031b141c
        run: |
          set -euo pipefail
          mkdir -p .release-tools/nju-cli-source
          curl -fL --retry 3 -o .release-tools/nju-cli-v1.4.6-source.tar.gz \
            https://github.com/nju-cli/nju-cli/archive/refs/tags/v1.4.6.tar.gz
          actual="$(python -c 'import hashlib, pathlib; print(hashlib.sha256(pathlib.Path(".release-tools/nju-cli-v1.4.6-source.tar.gz").read_bytes()).hexdigest())')"
          test "$actual" = "$NJU_SOURCE_SHA256"
          tar -xzf .release-tools/nju-cli-v1.4.6-source.tar.gz \
            -C .release-tools/nju-cli-source --strip-components=1
          test -f third_party/patches/nju-cli-v1.4.6-cache-dir.patch
          python desktop/patch_nju_cli.py .release-tools/nju-cli-source
          grep -Fq 'std::env::var_os("NJU_CLI_CACHE_DIR")' \
            .release-tools/nju-cli-source/crates/cli/src/auth.rs
      - name: Build patched nju-cli from source
        shell: bash
        working-directory: .release-tools/nju-cli-source
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --locked --release -p cli
      - name: Verify patched nju-cli and export native path
        shell: bash
        run: |
          set -euo pipefail
          binary=".release-tools/nju-cli-source/target/release/${{ matrix.nju_binary }}"
          test -f "$binary"
          python desktop/verify_nju_cli_patch.py "$binary"
          python - "$binary" <<'PY'
          import os
          import sys
          from pathlib import Path

          binary = Path(sys.argv[1]).resolve()
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as output:
              output.write(f"NJU_CLI_PATH={binary}\n")
          PY
      - name: Build desktop package
        shell: bash
        env:
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          python -m PyInstaller --noconfirm --clean desktop/nanyong_zhike.spec
          python desktop/smoke_test_release.py --dist dist/NanyongZhike
          python desktop/prepare_release.py \
            --platform "$RELEASE_PLATFORM" \
            --arch "$RELEASE_ARCH" \
            --nju-source .release-tools/nju-cli-v1.4.6-source.tar.gz
      - name: Build macOS disk image
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          xattr -cr "dist/南雍知课.app"
          xattr -dr com.apple.FinderInfo "dist/南雍知课.app" 2>/dev/null || true
          xattr -dr 'com.apple.fileprovider.fpfs#P' "dist/南雍知课.app" 2>/dev/null || true
          codesign --force --deep --sign - "dist/南雍知课.app"
          codesign --verify --deep --strict "dist/南雍知课.app"
          staging="release/dmg-root"
          mkdir -p "$staging"
          cp -R "dist/南雍知课.app" "$staging/南雍知课.app"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "南雍知课" -srcfolder "$staging" -ov -format UDZO \
            "release/NanyongZhike-macos-arm64.dmg"
          rm -rf "$staging"
      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $compiler)) { throw "Inno Setup is unavailable on this runner" }
          & $compiler "/DAppVersion=1.1.6" "desktop\windows-installer.iss"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: NanyongZhike-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.zip
            release/*.dmg
            release/*-setup.exe
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: NanyongZhike-*
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --title "南雍知课 ${GITHUB_REF_NAME}"
          --generate-notes
