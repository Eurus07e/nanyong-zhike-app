<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1067" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">南京大学本科生劳动教育学习导引图</title>
  <desc id="desc">劳动教育课程与基础实践、学科实践、综合实践模块要求</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0 0L8 4L0 8" fill="none" stroke="#6ea7d5" stroke-width="1.5"/></marker>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0}
      .title{fill:#64a5d6;font-size:31px;font-weight:700}.sub{fill:#222;font-size:14px;font-weight:600}
      .box{rx:9;stroke-width:1.5}.white{fill:#fff;stroke:#5d91bd}.orange{fill:#ef7f2d;stroke:#d66b1c}.blue{fill:#5d9ed0;stroke:#477fa9}.green{fill:#67a83d;stroke:#4f8c2d}.red{fill:#d00918;stroke:#78a7ce;stroke-width:2}
      .wt{fill:#fff;font-size:17px;font-weight:700}.small{font-size:14px}.orangeText{fill:#e77d2f;font-size:15px;font-weight:600}.blueText{fill:#568bb6;font-size:15px;font-weight:600}.greenText{fill:#5e9639;font-size:12.5px;font-weight:600}
      .line{fill:none;stroke:#6ea7d5;stroke-width:2}.arrow{fill:none;stroke:#6ea7d5;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="800" fill="#fff"/>
  <text x="600" y="54" text-anchor="middle" class="title">南京大学本科生劳动教育学习导引图</text>
  <text x="600" y="83" text-anchor="middle" class="sub">（适用于 2021 级及以后入学的在校本科生）</text>

  <rect x="42" y="270" width="170" height="95" class="box red"/>
  <text x="127" y="311" text-anchor="middle" class="wt">大学生劳动教育</text><text x="127" y="339" text-anchor="middle" class="wt small">（2 学分，32 学时）</text>

  <path d="M212 317H250V140H270M250 317V422H270" class="line"/>
  <rect x="270" y="105" width="160" height="72" class="box orange"/>
  <text x="350" y="134" text-anchor="middle" class="wt small">大学生劳动教育</text><text x="350" y="159" text-anchor="middle" class="wt small">（1 学分，8 学时）</text>
  <path d="M430 141H475" class="arrow"/>
  <rect x="478" y="106" width="625" height="68" class="box white"/>
  <text x="505" y="145" class="orangeText">大一上，通过修读《大学生劳动教育》慕课（含线下讨论课）获得学分</text>

  <rect x="270" y="378" width="160" height="84" class="box orange"/>
  <text x="350" y="408" text-anchor="middle" class="wt small">大学生劳动教育实践</text><text x="350" y="434" text-anchor="middle" class="wt small">（1 学分，24 学时，</text><text x="350" y="454" text-anchor="middle" class="wt small">计 20 小时）</text>

  <path d="M430 420H486V250H505M486 420V404H505M486 420V560H505" class="line"/>
  <rect x="505" y="214" width="157" height="72" class="box blue"/>
  <text x="583" y="243" text-anchor="middle" class="wt small">基础实践模块</text><text x="583" y="267" text-anchor="middle" class="wt small">（10-15 小时）</text>
  <path d="M662 250H710" class="arrow"/>
  <rect x="713" y="207" width="390" height="88" class="box white"/>
  <text x="735" y="236" class="blueText"><tspan x="735" dy="0">大一学年，通过积极参加后勤服务集团、新生学院及其他相关部门</tspan><tspan x="735" dy="24">与院系创设的劳动教育实践项目，至少获得 10 小时，至多可获得</tspan><tspan x="735" dy="24">15 小时劳动时长</tspan></text>

  <rect x="505" y="368" width="157" height="72" class="box blue"/>
  <text x="583" y="397" text-anchor="middle" class="wt small">学科实践模块</text><text x="583" y="421" text-anchor="middle" class="wt small">（至少 5 小时）</text>
  <path d="M662 404H710" class="arrow"/>
  <rect x="713" y="360" width="390" height="88" class="box white"/>
  <text x="735" y="394" class="blueText"><tspan x="735" dy="0">大二至大三学年，通过积极参加院系创设的劳动教育</tspan><tspan x="735" dy="25">实践项目，至少获得 5 小时劳动时长</tspan></text>

  <rect x="505" y="523" width="157" height="72" class="box blue"/>
  <text x="583" y="566" text-anchor="middle" class="wt small">综合实践模块</text>
  <path d="M662 559H696V494H714M696 559H714M696 559V625H714" class="line"/>
  <rect x="714" y="461" width="175" height="62" class="box green"/><text x="802" y="488" text-anchor="middle" class="wt small">勤工助学</text><text x="802" y="511" text-anchor="middle" class="wt small">（至少认定 5 小时）</text>
  <rect x="714" y="528" width="175" height="62" class="box green"/><text x="802" y="555" text-anchor="middle" class="wt small">志愿服务</text><text x="802" y="578" text-anchor="middle" class="wt small">（至少认定 5 小时）</text>
  <rect x="714" y="595" width="175" height="62" class="box green"/><text x="802" y="622" text-anchor="middle" class="wt small">其它综合实践劳动</text><text x="802" y="645" text-anchor="middle" class="wt small">（至少认定 5 小时）</text>
  <path d="M889 492H920" class="arrow"/><path d="M889 559H920" class="arrow"/><path d="M889 626H920" class="arrow"/>
  <rect x="922" y="457" width="181" height="68" class="box white"/><text x="939" y="477" class="greenText"><tspan x="939">大一至大三学年，通过</tspan><tspan x="939" dy="18">积极参加本科生院</tspan><tspan x="939" dy="18">勤工助学项目认定</tspan></text>
  <rect x="922" y="524" width="181" height="68" class="box white"/><text x="939" y="544" class="greenText"><tspan x="939">大一至大三学年，通过</tspan><tspan x="939" dy="18">积极参加团委志愿</tspan><tspan x="939" dy="18">服务项目认定</tspan></text>
  <rect x="922" y="591" width="181" height="94" class="box white"/><text x="939" y="605" class="greenText"><tspan x="939">大一至大三学年，通过</tspan><tspan x="939" dy="17">积极参加院系和相关</tspan><tspan x="939" dy="17">职能部门创设的其它</tspan><tspan x="939" dy="17">劳动教育实践项目</tspan><tspan x="939" dy="17">获得劳动时长</tspan></text>

  <path d="M82 548c-31-9-31-43-4-54-5-29 31-47 54-28 17-27 59-18 64 12 29-9 53 16 43 43 30 17 11 58-20 57-15 27-56 25-68 2-22 22-60 4-57-32z" fill="#70a8d4" stroke="#4d8bbb" stroke-width="2"/>
  <text x="150" y="519" text-anchor="middle" class="wt small"><tspan x="150">累计获得 20 小时劳动时长</tspan><tspan x="150" dy="24">认定获得 1 个实践学分</tspan></text>
  <text x="42" y="738" font-size="12" fill="#222"><tspan x="42">注：具体细则可参见本科生院主页“机构设置-规章制度-学校文件”相关管理办法。</tspan><tspan x="42" dy="21">本图依据南京大学本科生劳动教育学分管理办法整理。</tspan></text>
</svg>
